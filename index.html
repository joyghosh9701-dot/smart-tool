 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smarttool - 100% Working Image Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jsPDF Library for Image to PDF Conversion -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .btn-tool {
            width: 100%; border: 1px solid #d1d5db; border-radius: 4px; padding: 8px 4px;
            font-size: 11px; font-weight: 500; color: #374151; background-color: white;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02); transition: all 0.2s; cursor: pointer;
        }
        .btn-tool:hover { border-color: #4F5B93; color: #4F5B93; background-color: #f8fafc; }
        .section-title { font-size: 14px; font-weight: 700; color: #111827; margin-top: 24px; margin-bottom: 12px; }
        /* Loader */
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #4a5bb0; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: none; margin: 0 auto 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex justify-center">

    <div class="w-full max-w-[420px] bg-white shadow-2xl min-h-screen relative pb-10">
        
        <!-- Navbar -->
        <header class="bg-[#4a5bb0] text-white flex justify-between items-center px-4 py-3 sticky top-0 z-50">
            <div class="flex items-center gap-2">
                <div class="flex bg-white rounded text-[#4a5bb0] font-bold text-lg overflow-hidden shadow-sm">
                    <span class="px-2 py-0.5">Smart</span>
                    <span class="px-2 py-0.5 bg-gray-100 border-l border-gray-300">Tool</span>
                </div>
                <span class="font-bold tracking-wide text-[12px]">IMAGE EDITOR</span>
            </div>
            <button class="text-white text-2xl font-bold">&#9776;</button>
        </header>

        <main class="px-4 py-5">
            <h1 class="text-[16px] font-bold text-center text-gray-900 mb-5">100% Working Resize, Compress & Edit Tools</h1>

            <input type="file" id="imageUploader" class="hidden" accept="image/*">

            <!-- Result Area -->
            <div id="resultArea" class="hidden bg-green-50 border border-green-200 p-4 rounded-md mt-4 text-center">
                <div class="loader" id="loader"></div>
                <p class="text-green-700 font-bold text-sm mb-2" id="processMsg">Processing...</p>
                <img id="previewImage" class="max-w-full h-auto mx-auto border rounded shadow-sm mb-3 bg-white">
                <p id="sizeInfo" class="text-xs text-gray-600 mb-3 font-semibold"></p>
                <a id="downloadBtn" class="bg-[#4a5bb0] text-white px-4 py-2 rounded text-sm font-bold block w-full text-center cursor-pointer hover:bg-[#3a478c] transition">Download File</a>
                <button onclick="document.getElementById('resultArea').classList.add('hidden')" class="text-xs text-red-500 mt-3 font-bold border border-red-200 px-3 py-1 rounded">Close</button>
            </div>

            <!-- Compress Tools -->
            <h2 class="section-title">Compression Tools (Working)</h2>
            <div class="grid grid-cols-2 gap-2">
                <button class="btn-tool" data-action="compress" data-val="20">Compress to 20KB</button>
                <button class="btn-tool" data-action="compress" data-val="50">Compress to 50KB</button>
                <button class="btn-tool" data-action="compress" data-val="100">Compress to 100KB</button>
                <button class="btn-tool" data-action="compress" data-val="200">Compress to 200KB</button>
            </div>

            <!-- Resize / ID Photo -->
            <h2 class="section-title">Passport & Resize Tools</h2>
            <div class="grid grid-cols-2 gap-2">
                <button class="btn-tool" data-action="resize" data-w="413" data-h="531">Passport Photo (35x45)</button>
                <button class="btn-tool" data-action="resize" data-w="600" data-h="600">2x2 Inch Photo</button>
                <button class="btn-tool" data-action="resize" data-w="1080" data-h="1080">Instagram Post Size</button>
                <button class="btn-tool" data-action="resize" data-w="2560" data-h="1440">YouTube Banner</button>
            </div>

            <!-- Format Conversion -->
            <h2 class="section-title">Format Conversion</h2>
            <div class="grid grid-cols-2 gap-2">
                <button class="btn-tool" data-action="convert" data-format="png">Convert to PNG</button>
                <button class="btn-tool" data-action="convert" data-format="jpeg">Convert to JPG</button>
                <button class="btn-tool" data-action="convert" data-format="webp">Convert to WEBP</button>
            </div>

            <!-- Image to PDF -->
            <h2 class="section-title">Image to PDF Converter</h2>
            <div class="grid grid-cols-2 gap-2">
                <button class="btn-tool" data-action="pdf">Convert Image to PDF</button>
                <button class="btn-tool" data-action="pdf" data-compress="true">JPG to PDF (Compress)</button>
            </div>

            <!-- Effects & Filters -->
            <h2 class="section-title">Filters & Editing</h2>
            <div class="grid grid-cols-2 gap-2">
                <button class="btn-tool" data-action="filter" data-filter="grayscale(100%)">Black & White</button>
                <button class="btn-tool" data-action="filter" data-filter="blur(5px)">Blur Image</button>
                <button class="btn-tool" data-action="filter" data-filter="sepia(100%)">Sepia Filter</button>
                <button class="btn-tool" data-action="filter" data-filter="invert(100%)">Invert Colors</button>
                <button class="btn-tool" data-action="filter" data-filter="contrast(150%)">Increase Contrast</button>
                <button class="btn-tool" data-action="crop" data-type="circle">Circle Crop</button>
            </div>
        </main>
    </div>

    <!-- Hidden Canvas -->
    <canvas id="canvasElement" class="hidden"></canvas>

    <!-- Core Working Engine Script -->
    <script>
        const uploader = document.getElementById('imageUploader');
        const buttons = document.querySelectorAll('.btn-tool');
        const resultArea = document.getElementById('resultArea');
        const previewImage = document.getElementById('previewImage');
        const downloadBtn = document.getElementById('downloadBtn');
        const processMsg = document.getElementById('processMsg');
        const sizeInfo = document.getElementById('sizeInfo');
        const loader = document.getElementById('loader');
        const canvas = document.getElementById('canvasElement');
        const ctx = canvas.getContext('2d');

        let activeConfig = {};
        let originalFileName = "";

        // Button Click Handler
        buttons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                activeConfig = {
                    name: e.target.innerText,
                    action: e.target.getAttribute('data-action'),
                    val: e.target.getAttribute('data-val'),
                    w: e.target.getAttribute('data-w'),
                    h: e.target.getAttribute('data-h'),
                    format: e.target.getAttribute('data-format'),
                    filter: e.target.getAttribute('data-filter'),
                    type: e.target.getAttribute('data-type'),
                    pdfCompress: e.target.getAttribute('data-compress')
                };
                uploader.click();
            });
        });

        // File Selection Handler
        uploader.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            originalFileName = file.name.split('.')[0];
            resultArea.classList.remove('hidden');
            previewImage.classList.add('hidden');
            downloadBtn.classList.add('hidden');
            sizeInfo.innerText = "";
            loader.style.display = 'block';
            processMsg.innerText = "Processing Image, please wait...";

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    setTimeout(() => applyRealLogic(img, file.size), 500); // UI delay for smooth experience
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        // The Engine that does 100% Real Work
        function applyRealLogic(img, originalSize) {
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.filter = 'none'; // Reset

            let outputMime = 'image/jpeg';
            let quality = 0.92;
            let extension = 'jpg';
            let isPDF = false;
            let outputDataURL = "";

            // 1. FILTER ENGINE (Black & white, blur, sepia)
            if (activeConfig.action === 'filter') {
                ctx.filter = activeConfig.filter;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                outputDataURL = canvas.toDataURL(outputMime, quality);
            }
            
            // 2. RESIZE ENGINE (Passport, 2x2, specific pixels)
            else if (activeConfig.action === 'resize') {
                canvas.width = parseInt(activeConfig.w);
                canvas.height = parseInt(activeConfig.h);
                // Draw resized
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                outputDataURL = canvas.toDataURL(outputMime, quality);
            }

            // 3. FORMAT CONVERSION ENGINE (PNG, WEBP, JPG)
            else if (activeConfig.action === 'convert') {
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                outputMime = `image/${activeConfig.format}`;
                extension = activeConfig.format;
                // High quality for PNG/WEBP
                outputDataURL = canvas.toDataURL(outputMime, 1.0);
            }

            // 4. CIRCLE CROP ENGINE
            else if (activeConfig.action === 'crop' && activeConfig.type === 'circle') {
                const minSize = Math.min(img.width, img.height);
                canvas.width = minSize; canvas.height = minSize;
                ctx.beginPath();
                ctx.arc(minSize/2, minSize/2, minSize/2, 0, Math.PI * 2);
                ctx.closePath();
                ctx.clip();
                ctx.drawImage(img, (minSize - img.width)/2, (minSize - img.height)/2, img.width, img.height);
                outputMime = 'image/png'; extension = 'png'; // Must be PNG for transparent background
                outputDataURL = canvas.toDataURL(outputMime);
            }

            // 5. COMPRESS ENGINE (Target KB dynamically calculating quality)
            else if (activeConfig.action === 'compress') {
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                const targetKB = parseInt(activeConfig.val);
                let currentQuality = 0.9;
                outputDataURL = canvas.toDataURL('image/jpeg', currentQuality);
                
                // Iterative compression to reach target KB
                while (Math.round((outputDataURL.length * 3 / 4) / 1024) > targetKB && currentQuality > 0.1) {
                    currentQuality -= 0.1;
                    outputDataURL = canvas.toDataURL('image/jpeg', currentQuality);
                }
            }

            // 6. PDF GENERATOR ENGINE (Using jsPDF)
            else if (activeConfig.action === 'pdf') {
                isPDF = true;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                let pdfQuality = activeConfig.pdfCompress === 'true' ? 0.4 : 0.9;
                const imgData = canvas.toDataURL('image/jpeg', pdfQuality);
                
                const { jsPDF } = window.jspdf;
                // Auto orient portrait or landscape
                const orientation = canvas.width > canvas.height ? 'l' : 'p';
                const pdf = new jsPDF(orientation, 'px', [canvas.width, canvas.height]);
                pdf.addImage(imgData, 'JPEG', 0, 0, canvas.width, canvas.height);
                
                // Generate PDF Blob URL
                const pdfBlob = pdf.output('blob');
                outputDataURL = URL.createObjectURL(pdfBlob);
                extension = 'pdf';
            }

            // --- FINAL OUTPUT RENDER --- //
            loader.style.display = 'none';
            processMsg.innerText = `Success! Task: ${activeConfig.name}`;
            
            if(!isPDF) {
                previewImage.src = outputDataURL;
                previewImage.classList.remove('hidden');
                
                // Calculate new size
                const newSizeKB = Math.round((outputDataURL.length * 3 / 4) / 1024);
                const oldSizeKB = Math.round(originalSize / 1024);
                sizeInfo.innerHTML = `Original Size: <span class='text-red-500'>${oldSizeKB} KB</span> | New Size: <span class='text-green-600'>${newSizeKB} KB</span>`;
            } else {
                previewImage.classList.add('hidden');
                sizeInfo.innerHTML = `PDF Generated Successfully!`;
            }

            // Setup Download Button
            downloadBtn.href = outputDataURL;
            const safeToolName = activeConfig.name.replace(/[^a-zA-Z0-9]/g, '_');
            downloadBtn.download = `Smarttool_${safeToolName}_${originalFileName}.${extension}`;
            downloadBtn.classList.remove('hidden');

            uploader.value = ''; // Reset File Input
        }
    </script>
</body>
</html>
